name: portfolio_app
description: "Portfolio website built with Flutter"
publish_to: 'none' # Prevents publishing to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=3.9.2 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.7.0

  # For opening external links (LinkedIn, GitHub, Resume, Project URLs)
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/profile.jpg
    # Add more assets (logos, project screenshots, etc.)
    # Example:
    # - assets/projects/project1.png
    # - assets/icons/github.png

  # Uncomment and configure if you want custom fonts
  # fonts:
  #   - family: MyCustomFont
  #     fonts:
  #       - asset: fonts/MyCustomFont-Regular.ttf
  #       - asset: fonts/MyCustomFont-Bold.ttf
  #         weight: 700
